<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="../assets/weather.gif" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Projeto Clima</title>
</head>
<body class="bg-[url(../assets/bg.jpg)] bg-cover h-screen flex items-center justify-center">
  <main class="bg-white/50 w-1/4 flex flex-col items-center p-5 rounded-2xl shadow-2xl">
    <div class="flex items-center gap-5">
      <img class="h-20" src="../assets/weather.gif" alt="icone nuvem">
      <h1 class="text-2xl font-semibold">Clima</h1>
    </div>
    <form id="form" class="flex items-center gap-3">
      <input placeholder="Digite uma cidade" type="text" class="outline-cyan-600 rounded p-1 bg-white">
      <button class="rounded p-1 bg-white" type="submit">
        <img class="h-6" src="../assets/lupas.png" alt="">
      </button>
    </form>
  </main>

  <script src="../script/index.js"></script>
</body>
</html>
